name: Build Tweak & Reset Limit
on: [push, pull_request]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          sudo rm -rf /Users/runner/theos
          git clone --recursive https://github.com/theos/theos.git /Users/runner/theos
          
          # SDK yuklab olish (Kompilyatsiya uchun shart)
          mkdir -p /Users/runner/theos/sdks
          curl -L https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz -o /tmp/sdk.tar.xz
          tar -xf /tmp/sdk.tar.xz -C /Users/runner/theos/sdks/
          rm /tmp/sdk.tar.xz

      - name: Build Tweak
        run: |
          export THEOS=/Users/runner/theos
          make package FINALPACKAGE=1
          
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Run Reset Limit Script
        run: |
          python reset_limit.py
          
      - name: Upload Artifact - Tweak
        uses: actions/upload-artifact@v4
        with:
          name: ManusTweak-Dylib
          path: .theos/obj/main/*.dylib
      
      - name: Upload Artifact - Reset Script
        uses: actions/upload-artifact@v4
        with:
          name: reset_limit-script
          path: reset_limit.py
